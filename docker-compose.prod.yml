version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Build-time environment variables
        # These are baked into the build at build time
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:3000/api/v1}
        VITE_APP_NAME: ${VITE_APP_NAME:-Ecommerce Store}
        VITE_APP_VERSION: ${VITE_APP_VERSION:-1.0.0}
        VITE_ENABLE_FEATURES: ${VITE_ENABLE_FEATURES:-all}
        VITE_DEFAULT_CURRENCY: ${VITE_DEFAULT_CURRENCY:-USD}
        VITE_DEFAULT_LANGUAGE: ${VITE_DEFAULT_LANGUAGE:-en}
        VITE_BUILD_MODE: ${VITE_BUILD_MODE:-production}
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

