name: Build and Deploy

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run linter
      run: npm run lint
    
    - name: Type check
      run: npm run type-check
    
    - name: Build
      run: npm run build
      env:
        VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    
    - name: Build Docker image
      run: docker build -t ecommerce-frontend:${{ github.sha }} .
    
    - name: Push to registry (if configured)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        echo "Docker image built: ecommerce-frontend:${{ github.sha }}"
        # Add registry push commands here if using Docker Hub, GCR, ECR, etc.

